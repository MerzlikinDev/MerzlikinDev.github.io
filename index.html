<!DOCTYPE html>

<html lang="ru">
    <head>
        <meta name="viewport" content="width=device-width, initial-size=1.0">
        <style>
            h1, p, h2, h3, button, label, input {
                font-family: system-ui;
            }
            body {
                background-color: rgb(60, 189, 140);
            }
            button {
                background-color:rgb(6, 74, 48);
                color: rgb(255, 255, 255)
            }
            button:hover {
                background-color: rgb(17, 144, 95);
            }
            input {
                background-color:rgb(6, 74, 48);
                color: rgb(255, 255, 255);
            }
            .result {
                color: white;
                font-family: system-ui;
            }
            a {
                color: rgba(177, 115, 184, 0.479);
                font-size: 15px;
            } 
            a:hover {
                color: rgb(231, 12, 255);
            }  
        </style>
    </head>
    <body>
        <h1>Добро пожаловать в эмулятор НАМ</h1>
        <a href="https://cf2.ppt-online.org/files2/slide/v/vxinJj3DZA8OyMBIduw4olzEQ5L6gfpkNGmFVH/slide-24.jpg">узнайте о машине маркова</a>
        <br>
        <br>
        <input type="file" id="file">
        <label for="file">Загрузить Файл с правилами (.txt)</label>
        <br>
        <br>
        <button id="word">слово</button>
        <label for="word">напишите входное слово</label>
        <p>Результат:</p>
        <div id="result" class="result">(пока не запущено)</div>
        <script>
            // Типо аналог питоновского реплейса
            function replaceFirst(str, search, replace) {
                if (search === "") {

                    return replace + str;
                }
                const index = str.indexOf(search);
                if (index === -1) return str;
                return str.slice(0, index) + replace + str.slice(index + search.length);
            }
        
            // всякая биледерда
            function runMarkovMachine(word, rules) {
                const startTime = Date.now();
                const TIMEOUT_MS = 7500;
        
                let currentWord = word;
        
                while (true) {
                    if (Date.now() - startTime > TIMEOUT_MS) {
                        throw new Error("превышенно время выполнения");
                    }
        
                    let applied = false;
                    for (const [left, arrow, right] of rules) {
                        if (left === "" || currentWord.includes(left)) {
                            currentWord = replaceFirst(currentWord, left, right);
        
                            if (arrow === "=>") {
                            
                                return currentWord;
                            }
                            
                            applied = true;
                            break;
                        }
                    }
                    if (!applied) {
                        return currentWord;
                    }
                }
            }
        
            //что-то посложней
            function displayResult(text, isError = false) {
                const resultDiv = document.getElementById("result");
                resultDiv.textContent = text;
                if (isError) {
                    resultDiv.classList.add("error");
                } else {
                    resultDiv.classList.remove("error");
                }
            }
        
            // для кнопки ввода слова
            document.getElementById("word").addEventListener("click", async () => {
                // решил через prompt
                const word = prompt("Введите слово:");
                if (word === null) {
                    displayResult("Слово не введено", true);
                    return;
                }
        
                //ну это вроде типо аналог open в питоне (его навайбкодил)
                const fileInput = document.getElementById("file");
                const file = fileInput.files[0];
                if (!file) {
                    displayResult("Ошибка: выберите файл с правилами", true);
                    return;
                }
        
                displayResult("загрузка...");
        
                try {
                    const content = await readFileAsText(file);
                    const lines = content.split(/\r?\n/);
                    const rules = [];
        
                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (trimmed === "") continue;
                        const parts = trimmed.split(/\s+/);
                        if (parts.length === 3) {

                            rules.push([parts[0], parts[1], parts[2]]);
                        } else if (parts.length === 2) {
                            rules.push(["", parts[0], parts[1]]);
                        }
                    }
        
                    const result = runMarkovMachine(word, rules);
                    displayResult(result);
                } catch (err) {
                    displayResult(`Ошибка: ${err.message}`, true);
                }
            });
        
            // Вспомогательная функция для чтения файла через Promise
            function readFileAsText(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.onerror = () => reject(new Error("Не удалось прочитать файл"));
                    reader.readAsText(file, "UTF-8");
                });
            }
        </script>
        <br>
        <br>
        <br>
        <br>
        <br>
        <br>
        <br>
        <br>
        <br>
        <br>
        <br>
        <br>
        <br>
        <br>
        <p style="text-align: center; color: rgba(255, 255, 255, 0.276)">сделано мишаней (v. 0.0.3)</p>
    </body>
</html>
