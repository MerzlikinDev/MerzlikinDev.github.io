<!DOCTYPE html>

<html lang="ru">
    <head>
        <meta name="viewport" content="width=device-width, initial-size=1.0">
      <link rel="icon" href="https://i.pinimg.com/736x/c2/f4/7f/c2f47f9eb58cb3b0fc3e64481574327c.jpg" type="image/png">
        <style>
            h1, p, h2, h3, button, label, input {
                font-family: Cursive;
            }
            body {
                background-color: rgb(215, 207, 191);
            }
            button {
                background-color: rgb(135, 114, 89);
                color: rgb(255, 255, 255)
            }
            button:hover {
                background-color: rgb(30, 57, 75);
            }
            input {
                background-color:rgb(135, 114, 89);
                color: rgb(255, 255, 255);
            }
            .result {
                font-family: Cursive;
            }
            a {
                color: rgba(30, 57, 75);
                font-size: 15px;
            } 
            h1:hover {
              color: rgb(30, 57, 75); 
          }
            a:hover {
                color: black;
            }
          .real-file-input {
            display: none;
          }
          
        </style>
    </head>
    <body>
        <h1>Добро пожаловать в эмулятор НАМ</h1>
        <a href="https://cf2.ppt-online.org/files2/slide/v/vxinJj3DZA8OyMBIduw4olzEQ5L6gfpkNGmFVH/slide-24.jpg" target="_blank">узнайте о машине маркова</a>
      <br>
      <a href="https://vk.com/dzuakuy" target="_blank">по вопросам, касательно работы сайта обращайтесь сюда<a>
        <br>
        <br>
        <input type="file" id="file" class="real-file-input">
        <p>загрузить файл с правилами: <label for="file"><img src="https://static.vecteezy.com/system/resources/previews/000/441/686/non_2x/down-vector-icon.jpg" width=30 height=30></img></label></p>

        <br>
        <br>
        <label for="word">напишите входное слово</label>
        <br>
        <input type="text" id="word">
        <button id="OK">OK</button>
        <p>Результат:</p>
        <div id="result" class="result">(пока не запущено)</div>
        <script>
    //replace one substring to other one
    //str - what change
    //replace - to what change
    function replaceFirst(str, search, replace) {
        if (search === "") {
            return replace + str;
        }
        const index = str.indexOf(search);
        if (index === -1) return str;
        return str.slice(0, index) + replace + str.slice(index + search.length);
    }

    //Markov's machine main algorithm function
    //word - input word
    //rules - array of rules for Markov's machine
    function runMarkovMachine(word, rules) {
        const startTime = Date.now();
        const TIMEOUT_MS = 7500;

        let currentWord = word;

        while (true) {
            if (Date.now() - startTime > TIMEOUT_MS) {
                throw new Error("превышенно время выполнения");
            }

            let applied = false;
            for (const [left, arrow, right] of rules) {
                if (left === "" || currentWord.includes(left)) {
                    currentWord = replaceFirst(currentWord, left, right);

                    if (arrow === "=>") {
                        
                        return currentWord;
                    }
                    applied = true;
                    break;
                }
            }
            if (!applied) {
                return currentWord;
            }
        }
    }

    //display result on the site
    //text - result
    //isError - true if something wrong with input file and false else.
    function displayResult(text, isError = false) {
        const resultDiv = document.getElementById("result");
        resultDiv.textContent = text;
        if (isError) {
            resultDiv.classList.add("error");
        } else {
            resultDiv.classList.remove("error");
        }
    }

    //reading file as lines of text
    //file - input file
    function readFileAsText(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => resolve(e.target.result);
            reader.onerror = () => reject(new Error("Не удалось прочитать файл"));
            reader.readAsText(file, "UTF-8");
        });
    }


    document.getElementById("OK").addEventListener("click", async () => {
        const wordInput = document.getElementById("word");
        const word = wordInput.value.trim();
        if (word === "") {
            displayResult("Ошибка: введите слово", true);
            return;
        }

        const fileInput = document.getElementById("file");
        const file = fileInput.files[0];
        if (!file) {
            displayResult("Ошибка: выберите файл с правилами", true);
            return;
        }

        displayResult("Обработка...");

        try {
            const content = await readFileAsText(file);
            const lines = content.split(/\r?\n/);
            const rules = [];

            for (const line of lines) {
                const trimmed = line.trim();
                if (trimmed === "") continue;
                const parts = trimmed.split(/\s+/);
                if (parts.length === 3) {
                    rules.push([parts[0], parts[1], parts[2]]);
                } else if (parts.length === 2) {
                    rules.push(["", parts[0], parts[1]]);
                }
            }

            if (rules.length === 0) {
                displayResult("Ошибка: файл не содержит правил", true);
                return;
            }
            const result = runMarkovMachine(word, rules);
            displayResult(result);
        } catch (err) {
            displayResult(`Ошибка: ${err.message}`, true);
        }
    });
</script>
        <br>
        <br>
        <br>

        <p style="text-align: center; color: rgba(255, 255, 255, 0.276)">сделано мишаней (v. 0.0.79)</p>
    </body>
</html>
